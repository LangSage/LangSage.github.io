<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f7f5ef">
<title>Вопросы для детей-соглядатаев</title>
<style>
:root{color-scheme:light;--bg:#f7f5ef;--panel:#fffdf8;--text:#211f1a;--muted:#676157;--line:#ddd6c9;--brand:#0f7b6c;--accent:#f0b429;--shadow:0 10px 28px rgba(50,42,30,.12);--step:1}[data-theme=dark]{color-scheme:dark;--bg:#171915;--panel:#23251f;--text:#f6f1e7;--muted:#c7bdad;--line:#3c4036;--brand:#45c2aa;--accent:#ffd166;--shadow:0 10px 28px rgba(0,0,0,.32)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;letter-spacing:0}button{font:inherit}.app{width:min(100%,720px);min-height:100vh;margin:auto;padding:max(14px,env(safe-area-inset-top)) 14px max(18px,env(safe-area-inset-bottom))}.topbar{position:sticky;top:0;z-index:5;margin:-14px -14px 12px;padding:max(14px,env(safe-area-inset-top)) 14px 12px;background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid color-mix(in srgb,var(--line) 72%,transparent)}.title-row{display:grid;grid-template-columns:1fr 42px;gap:10px;align-items:center}h1{margin:0;font-size:calc(25px*var(--step));line-height:1.08;letter-spacing:0}.subtitle{margin:5px 0 0;color:var(--muted);font-size:calc(13px*var(--step));line-height:1.25}.icon-button{width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--line);border-radius:8px;color:var(--text);background:var(--panel);box-shadow:0 4px 12px rgba(0,0,0,.05)}svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}.age-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.age-tab{min-height:44px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--text);text-align:left;padding:8px 10px}.age-tab strong{display:block;font-size:calc(16px*var(--step));line-height:1.05}.age-tab span{display:block;margin-top:2px;color:var(--muted);font-size:calc(11px*var(--step))}.age-tab.active{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 14%,var(--panel));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--brand) 55%,transparent)}.categories{display:flex;gap:7px;overflow-x:auto;padding:2px 0 3px;margin-top:10px;scrollbar-width:none}.categories::-webkit-scrollbar{display:none}.category{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;min-height:35px;border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--panel);color:var(--text);white-space:nowrap;font-size:calc(13px*var(--step))}.category svg{width:16px;height:16px}.category.active{color:#fff;border-color:var(--brand);background:var(--brand)}.meta-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:14px 1px 10px;color:var(--muted);font-size:calc(13px*var(--step))}.question-list{display:grid;gap:10px}.card{display:grid;grid-template-columns:42px 1fr;gap:10px;align-items:start;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:var(--shadow)}.number{width:42px;aspect-ratio:1;display:grid;place-items:center;border-radius:8px;background:color-mix(in srgb,var(--accent) 28%,var(--panel));color:var(--text);font-size:calc(18px*var(--step));font-weight:700;line-height:1}.question{margin:0;font-size:calc(19px*var(--step));line-height:1.28;overflow-wrap:anywhere}.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.tag{border-radius:999px;padding:4px 7px;background:color-mix(in srgb,var(--line) 48%,transparent);color:var(--muted);font-size:calc(11px*var(--step));line-height:1}.empty{display:none;padding:22px 14px;border:1px dashed var(--line);border-radius:8px;color:var(--muted);text-align:center;background:color-mix(in srgb,var(--panel) 72%,transparent);font-size:calc(15px*var(--step))}.settings{position:fixed;inset:auto 12px max(12px,env(safe-area-inset-bottom)) 12px;z-index:10;display:none;max-width:692px;margin:0 auto;padding:12px;border:1px solid var(--line);border-radius:8px;background:var(--panel);box-shadow:0 18px 50px rgba(0,0,0,.28)}.settings.open{display:block}.settings-header{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.settings-title{margin:0;font-size:calc(18px*var(--step));font-weight:700}.setting-row{display:grid;gap:8px;margin-top:12px}.setting-row label{color:var(--muted);font-size:calc(13px*var(--step))}.setting-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.setting-actions button{min-height:42px;border:1px solid var(--line);border-radius:8px;color:var(--text);background:var(--bg)}.setting-actions button.active{border-color:var(--brand);background:color-mix(in srgb,var(--brand) 16%,var(--panel))}input[type=range]{width:100%;accent-color:var(--brand)}@media (min-width:560px){.question-list{grid-template-columns:1fr 1fr}.card{min-height:154px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar">
<div class="title-row"><div><h1>Вопросы для детей-соглядатаев</h1><p class="subtitle">Для ведущего конкурса: быстро выбрать задание и проверить ответы по форме лидеров.</p></div><button class="icon-button" id="settingsToggle" type="button" aria-label="Настройки"><svg viewBox="0 0 24 24"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 0 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.9.3l-.1.1A2 2 0 0 1 4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.5-1H3a2 2 0 0 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.9L4.2 7A2 2 0 0 1 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3h.1A1.7 1.7 0 0 0 10 3.1V3a2 2 0 0 1 4 0v.1a1.7 1.7 0 0 0 1 1.5h.1a1.7 1.7 0 0 0 1.9-.3l.1-.1A2 2 0 0 1 19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9v.1a1.7 1.7 0 0 0 1.5.9h.1a2 2 0 0 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1Z"></path></svg></button></div>
<nav class="age-tabs"><button class="age-tab active" type="button" data-age="younger"><strong>Младше</strong><span>6-9 лет</span></button><button class="age-tab" type="button" data-age="older"><strong>Старше</strong><span>10-13 лет</span></button></nav>
<nav class="categories"><button class="category active" type="button" data-category="all">Все</button><button class="category" type="button" data-category="socks">Носки</button><button class="category" type="button" data-category="accessories">Аксессуары</button><button class="category" type="button" data-category="clothes">Одежда</button><button class="category" type="button" data-category="shoes">Обувь</button><button class="category" type="button" data-category="transport">Машины</button></nav>
</header>
<section class="meta-row"><span id="currentMode">Младше: 6-9 лет</span><strong id="countText">0 вопросов</strong></section>
<section class="question-list" id="questionList"></section><p class="empty" id="emptyState">В этой категории пока нет вопросов для выбранного возраста.</p>
</main>
<aside class="settings" id="settingsPanel"><div class="settings-header"><p class="settings-title">Настройки</p><button class="icon-button" id="settingsClose" type="button" aria-label="Закрыть настройки"><svg viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg></button></div><div class="setting-row"><label for="fontSize">Размер текста</label><input id="fontSize" type="range" min="0.9" max="1.3" step="0.05" value="1"></div><div class="setting-row"><label>Тема</label><div class="setting-actions"><button class="active" type="button" data-theme-choice="light">Светлая</button><button type="button" data-theme-choice="dark">Темная</button></div></div></aside>
<script>
const questions=[
[1,'Узнай, какого цвета носки у лидера.','younger','socks'],[2,'Узнай, есть ли у лидера белый цвет на носках.','younger','socks'],[3,'Узнай, есть ли у лидера розовый цвет на носках.','younger','socks'],[4,'Посчитай, сколько лидеров сегодня носят часы на руке.','older','accessories'],[5,'Узнай, на какой руке часы у конкретного лидера.','older','accessories'],[6,'Узнай, сколько браслетов у Евы.','younger','accessories'],[7,'Узнай, сколько лидеров сегодня имеют браслеты.','older','accessories'],[8,'Узнай, какого цвета куртка у лидера.','younger','clothes'],[9,'Найди лидера, у которого больше всего видимых карманов.','older','clothes'],[10,'Посчитай, сколько видимых карманов у выбранного лидера.','older','clothes'],[11,'Найди лидера, у которого есть шнурки на обуви.','younger','shoes'],[12,'Узнай, какого цвета шнурки у лидера.','younger','shoes'],[13,'Найди лидера с самой заметной особенностью на обуви.','older','shoes'],[14,'Узнай, какая обувь у лидера: кроссовки, ботинки, туфли или другая.','younger','shoes'],[15,'Посчитай, сколько лидеров сегодня в кроссовках.','older','shoes'],[16,'Узнай, сколько лидеров имеют машину.','older','transport'],[17,'Узнай, сколько лидеров сегодня приехали на машине.','older','transport'],[18,'Найди лидера, у которого есть кольцо на руке.','younger','accessories'],[19,'Найди лидера, у которого есть надпись или рисунок на одежде.','younger','clothes'],[20,'Узнай, какой цвет больше всего заметен в одежде выбранного лидера.','younger','clothes'],[21,'Найди лидера с бейджем, значком или наклейкой на одежде.','younger','clothes'],[22,'Узнай, сколько лидеров имеют белый цвет на носках.','older','socks'],[23,'Узнай, сколько лидеров имеют розовый цвет на носках.','older','socks'],[24,'Найди двух лидеров с одинаковым цветом носков.','older','socks'],[25,'Найди лидера, у которого больше всего аксессуаров: часы, браслеты, кольца, значки.','older','accessories'],[26,'Найди лидера с дырявыми ботинками.','younger','shoes']].map(([id,text,age,category])=>({id,text,age,category}));
const names={socks:'Носки',accessories:'Аксессуары',clothes:'Одежда',shoes:'Обувь',transport:'Машины'};let activeAge=localStorage.getItem('awana-age')||'younger',activeCategory='all';const list=document.querySelector('#questionList'),countText=document.querySelector('#countText'),currentMode=document.querySelector('#currentMode'),emptyState=document.querySelector('#emptyState'),settingsPanel=document.querySelector('#settingsPanel'),fontSize=document.querySelector('#fontSize');function word(n){return n%10===1&&n%100!==11?'вопрос':[2,3,4].includes(n%10)&&![12,13,14].includes(n%100)?'вопроса':'вопросов'}function render(){document.querySelectorAll('.age-tab').forEach(t=>t.classList.toggle('active',t.dataset.age===activeAge));const items=questions.filter(q=>q.age===activeAge&&(activeCategory==='all'||q.category===activeCategory));list.innerHTML=items.map(q=>`<article class="card"><div class="number">${q.id}</div><div><p class="question">${q.text}</p><div class="tags"><span class="tag">${q.age==='younger'?'Младше':'Старше'}</span><span class="tag">${names[q.category]}</span></div></div></article>`).join('');countText.textContent=`${items.length} ${word(items.length)}`;currentMode.textContent=activeAge==='younger'?'Младше: 6-9 лет':'Старше: 10-13 лет';emptyState.style.display=items.length?'none':'block'}document.querySelectorAll('.age-tab').forEach(t=>t.onclick=()=>{activeAge=t.dataset.age;localStorage.setItem('awana-age',activeAge);render()});document.querySelectorAll('.category').forEach(b=>b.onclick=()=>{activeCategory=b.dataset.category;document.querySelectorAll('.category').forEach(x=>x.classList.toggle('active',x===b));render()});settingsToggle.onclick=()=>settingsPanel.classList.toggle('open');settingsClose.onclick=()=>settingsPanel.classList.remove('open');fontSize.value=localStorage.getItem('awana-font-size')||'1';document.documentElement.style.setProperty('--step',fontSize.value);fontSize.oninput=()=>{document.documentElement.style.setProperty('--step',fontSize.value);localStorage.setItem('awana-font-size',fontSize.value)};function setTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('awana-theme',theme);document.querySelector('meta[name="theme-color"]').content=theme==='dark'?'#171915':'#f7f5ef';document.querySelectorAll('[data-theme-choice]').forEach(b=>b.classList.toggle('active',b.dataset.themeChoice===theme))}document.querySelectorAll('[data-theme-choice]').forEach(b=>b.onclick=()=>setTheme(b.dataset.themeChoice));setTheme(localStorage.getItem('awana-theme')||'light');render();
</script>
</body>
</html>
